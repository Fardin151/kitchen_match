name: kitchen_match
description: Recipe recommender based on your kitchen ingredients.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  google_fonts: ^6.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/recipes.json

# Run `dart run flutter_launcher_icons` after changing assets/icon/app_icon.png
# to regenerate the Android mipmaps and web icons.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  android: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FAF6EC"
    theme_color: "#E8801F"
